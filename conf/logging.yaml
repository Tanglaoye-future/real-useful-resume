# ResuMiner 统一日志配置
version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  detailed:
    format: "%(asctime)s - %(name)s - %(levelname)s - [%(filename)s:%(lineno)d] - %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  json:
    format: "%(asctime)s %(name)s %(levelname)s %(filename)s %(lineno)d %(message)s"
    class: pythonjsonlogger.jsonlogger.JsonFormatter

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

  file_crawler:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: detailed
    filename: ./data/logs/crawler/crawler.log
    maxBytes: 10485760  # 10MB
    backupCount: 10
    encoding: utf-8

  file_error:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: detailed
    filename: ./data/logs/system/error.log
    maxBytes: 10485760  # 10MB
    backupCount: 10
    encoding: utf-8

  file_etl:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: detailed
    filename: ./data/logs/etl/etl.log
    maxBytes: 10485760  # 10MB
    backupCount: 5
    encoding: utf-8

loggers:
  resuminer:
    level: INFO
    handlers: [console, file_crawler, file_error]
    propagate: false

  resuminer.crawler:
    level: INFO
    handlers: [console, file_crawler, file_error]
    propagate: false

  resuminer.etl:
    level: INFO
    handlers: [console, file_etl, file_error]
    propagate: false

root:
  level: INFO
  handlers: [console, file_error]
