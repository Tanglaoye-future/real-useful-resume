version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: spider_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  spider_engine:
    build: .
    container_name: spider_engine
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # === 动态隧道代理配置 ===
      # 替换为你的代理服务商提供的隧道服务器地址和端口
      - PROXY_SERVER=http://tps123.kdlapi.com:15818
      # 替换为你的代理用户名和密码 (如没有可留空)
      - PROXY_USER=your_proxy_username
      - PROXY_PASS=your_proxy_password
    volumes:
      - ./output:/app/output
    restart: on-failure

volumes:
  redis_data: